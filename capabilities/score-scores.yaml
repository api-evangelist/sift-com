naftiko: 1.0.0-alpha2
info:
  label: Sift Score API — Scores
  description: Retrieve and recompute Sift risk scores across configured abuse types.
  tags:
    - Sift
    - Scores
    - Risk
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      SIFT_API_KEY: SIFT_API_KEY
capability:
  consumes:
    - type: http
      namespace: score-scores
      baseUri: https://api.sift.com
      description: Sift Score API for synchronous and on-demand risk score retrieval.
      resources:
        - name: user-score
          path: /v205/score/{user_id}
          operations:
            - name: getscore
              method: GET
              description: Sift Get User Score
              outputRawFormat: json
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                - name: abuse_types
                  in: query
                  type: string
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: user-rescore
          path: /v205/rescore/{user_id}
          operations:
            - name: rescoreuser
              method: POST
              description: Sift Rescore User
              outputRawFormat: json
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                - name: abuse_types
                  in: query
                  type: string
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: basic
        value: '{{env.SIFT_API_KEY}}:'
        placement: header
  exposes:
    - type: rest
      namespace: score-scores-rest
      port: 8080
      description: REST adapter for Sift Score API.
      resources:
        - path: /v1/score/{user_id}
          name: user-score
          description: REST surface for the Sift user score.
          operations:
            - method: GET
              name: getscore
              description: Sift Get User Score
              call: score-scores.getscore
              with:
                user_id: rest.user_id
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: score-scores-mcp
      port: 9090
      transport: http
      description: MCP adapter for Sift Score operations.
      tools:
        - name: sift-get-score
          description: Sift Get User Score
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: score-scores.getscore
          with:
            user_id: tools.user_id
          outputParameters:
            - type: object
              mapping: $.
        - name: sift-rescore-user
          description: Sift Rescore User
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: score-scores.rescoreuser
          with:
            user_id: tools.user_id
          outputParameters:
            - type: object
              mapping: $.
