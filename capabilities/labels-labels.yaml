naftiko: 1.0.0-alpha2
info:
  label: Sift Labels API — Labels
  description: Apply and remove fraud labels on Sift users to train ML models. Deprecated in favor of Decisions for new integrations.
  tags:
    - Sift
    - Labels
    - Fraud
    - Deprecated
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      SIFT_API_KEY: SIFT_API_KEY
capability:
  consumes:
    - type: http
      namespace: labels-labels
      baseUri: https://api.sift.com
      description: Sift Labels API for legacy fraud labeling.
      resources:
        - name: user-labels
          path: /v205/users/{user_id}/labels
          operations:
            - name: applylabel
              method: POST
              description: Sift Apply User Label
              outputRawFormat: json
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: removelabel
              method: DELETE
              description: Sift Remove User Label
              outputRawFormat: json
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                - name: abuse_type
                  in: query
                  type: string
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: basic
        value: '{{env.SIFT_API_KEY}}:'
        placement: header
  exposes:
    - type: mcp
      namespace: labels-labels-mcp
      port: 9090
      transport: http
      description: MCP adapter for Sift Labels operations.
      tools:
        - name: sift-apply-label
          description: Sift Apply User Label
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: labels-labels.applylabel
          with:
            user_id: tools.user_id
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
