specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Sift
providerId: sift-com
created: '2026-05-25'
modified: '2026-05-25'
reconciled: false
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Fraud Prevention
description: |
  FOCUS-aligned FinOps definition for Sift's Digital Trust and Safety platform. Sift charges enterprise contracts
  scoped to processed events, transactions, decisions, and dispute representments. Token-equivalent metering is
  not applicable.
sources:
  - https://sift.com/products
  - https://sift.com/platform/payment-protection
  - https://developers.sift.com/docs/curl/api-overview
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sift
serviceCategory: Security and Identity
billingModel:
  pricingCategory: Enterprise Contract
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Subscription
    - Adjustment
  primaryUnit: event
  secondaryUnits:
    - decision
    - dispute
    - verification
focusColumns:
  ServiceName: Sift Digital Trust and Safety Platform
  ServiceCategory: Security and Identity
  ProviderName: Sift
  PublisherName: Sift
  InvoiceIssuerName: Sift
  PricingCategory: Enterprise Contract
  PricingUnit: event
  BillingCurrency: USD
meters:
  - name: events_processed
    unit: event
    aggregation: sum
    dimensions:
      - account
      - event_type
      - abuse_type
  - name: scores_requested
    unit: score
    aggregation: sum
    dimensions:
      - account
      - abuse_type
  - name: decisions_applied
    unit: decision
    aggregation: sum
    dimensions:
      - account
      - entity_type
      - source
  - name: verifications_sent
    unit: verification
    aggregation: sum
    dimensions:
      - account
      - verification_type
  - name: disputes_managed
    unit: dispute
    aggregation: sum
    dimensions:
      - account
      - network
allocationDimensions:
  - account
  - workspace
  - abuse_type
  - entity_type
notes:
  - Sift pricing is bespoke per account. FOCUS mapping above describes the operational metering Sift exposes via
    the Console and customer reporting rather than a public rate card.
